  <title>星期八 · 小八 — 你的职场 AI 伙伴</title>

  <style>
    :root {
      --cream: #F5F1EB;
      --warm-brown: #8B6F47;
      --soft-brown: #C4A882;
      --accent: #D4845A;
      --accent-light: #F0C4A8;
      --text-dark: #3D2B1F;
      --text-mid: #7A5C42;
      --text-light: #B09070;
      --card-bg: rgba(255,255,255,0.72);
      --card-border: rgba(196,168,130,0.3);
      --shadow: rgba(139,111,71,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(212,132,90,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(196,168,130,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 60% 30%, rgba(240,196,168,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating dots decoration */
    .bg-dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-dots span {
      position: absolute;
      border-radius: 50%;
      background: var(--soft-brown);
      opacity: 0.12;
      animation: floatDot linear infinite;
    }

    @keyframes floatDot {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.12; }
      50% { opacity: 0.06; }
      100% { transform: translateY(-80px) rotate(360deg); opacity: 0.12; }
    }

    /* Main wrapper */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 6rem;
    }

    /* Top badge */
    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.6);
      border: 0.5px solid var(--card-border);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--text-mid);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
      backdrop-filter: blur(8px);
      animation: fadeUp 0.8s ease both;
    }
    .top-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.9s ease 0.1s both;
    }

    .hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: 0.04em;
      line-height: 1.15;
      margin-bottom: 0.9rem;
      position: relative;
      display: inline-block;
    }

    .hero-title .accent-char {
      color: var(--accent);
      position: relative;
    }

    .hero-title::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -8px;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
      border-radius: 99px;
    }

    .hero-sub {
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      font-weight: 300;
      color: var(--text-mid);
      letter-spacing: 0.12em;
      margin-top: 1.2rem;
    }

    /* Divider ornament */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      color: var(--soft-brown);
      font-size: 18px;
      animation: fadeUp 1s ease 0.2s both;
    }
    .ornament::before, .ornament::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: linear-gradient(90deg, transparent, var(--soft-brown), transparent);
      max-width: 120px;
    }

    /* Prompt label */
    .prompt-label {
      font-size: 13px;
      color: var(--text-light);
      letter-spacing: 0.1em;
      margin-bottom: 1.4rem;
      animation: fadeUp 1s ease 0.25s both;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 820px;
      animation: fadeUp 1s ease 0.35s both;
    }

    .card {
      background: var(--card-bg);
      border: 0.5px solid var(--card-border);
      border-radius: 20px;
      padding: 1.6rem 1.5rem;
      width: 220px;
      cursor: pointer;
      text-align: left;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px var(--shadow), 0 1px 3px rgba(255,255,255,0.8) inset;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 20px 20px 0 0;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 36px var(--shadow), 0 1px 3px rgba(255,255,255,0.8) inset;
      border-color: var(--accent-light);
    }
    .card:hover::before { opacity: 1; }
    .card:active { transform: translateY(-2px) scale(0.98); }

    .card-1::before { background: linear-gradient(90deg, #F0A070, #D4845A); }
    .card-2::before { background: linear-gradient(90deg, #A0C4B8, #6AA89A); }
    .card-3::before { background: linear-gradient(90deg, #D4A0C8, #B070A0); }

    .card-emoji {
      font-size: 2.2rem;
      margin-bottom: 0.9rem;
      display: block;
      line-height: 1;
    }

    .card-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--text-light);
      line-height: 1.6;
      letter-spacing: 0.03em;
    }

    .card-arrow {
      position: absolute;
      bottom: 1.2rem;
      right: 1.2rem;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(212,132,90,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: var(--accent);
      transition: background 0.2s, transform 0.2s;
    }
    .card:hover .card-arrow {
      background: rgba(212,132,90,0.2);
      transform: translate(2px, -2px);
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.1em;
      z-index: 2;
      pointer-events: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(61,43,31,0.88);
      color: #F5F1EB;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      letter-spacing: 0.05em;
      z-index: 9999;
      backdrop-filter: blur(8px);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

          const sendBtn = document.querySelector('[class*="send"], [class*="Submit"]');
          if (inputEl) {
            const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
            nativeInputValueSetter.call(inputEl, message);
            inputEl.dispatchEvent(new Event('input', { bubbles: true }));
            inputEl.dispatchEvent(new Event('change', { bubbles: true }));
            setTimeout(() => {
              if (sendBtn) {
                sendBtn.click();
              } else {
                inputEl.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
              }
            }, 300);
          } else if (chatClient && typeof chatClient.sendMessage === 'function') {
            chatClient.sendMessage({ content: message });
          }
        } catch(err) {
          console.warn('Send message error:', err);
        }
      }, 800);
    } catch(e) {
      console.warn('Bot interaction error:', e);
    }
  }
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-sdk/1.0.0-beta.4/index.js"></script>
